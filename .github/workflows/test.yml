name: Tests
on: [push, pull_request]
jobs:
    unit:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4
            - uses: actions/setup-node@v4
              with:
                  node-version: '22'
                  cache: 'pnpm'
            - uses: pnpm/action-setup@v3
            - run: pnpm install --frozen-lockfile
            - run: pnpm test

    e2e:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4
            - uses: actions/setup-node@v4
              with:
                  node-version: '22'
                  cache: 'pnpm'
            - uses: pnpm/action-setup@v3
            - run: pnpm install --frozen-lockfile
            - run: pnpm exec playwright install --with-deps chromium
            - run: pnpm test:e2e
